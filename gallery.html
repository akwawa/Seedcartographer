<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Seedcartographer — seed gallery</title>
<meta name="theme-color" content="#0c1016">
<link rel="canonical" href="https://seedcarto.com/gallery.html">
<link rel="icon" href="./icon.svg" type="image/svg+xml">
<link rel="stylesheet" href="./fonts/fonts.css">
<link rel="stylesheet" href="./styles.css">
</head>
<body class="gallerypage">
<header class="topbar">
  <div class="brand"><span class="mark"></span>Seedcartographer</div>
  <a class="btn tiny" href="./index.html" id="backLink">← app</a>
</header>
<main class="gallerymain">
  <h1 id="galleryTitle">Seed gallery</h1>
  <p class="muted" id="galleryLede">A hand-picked list of remarkable seeds and places. Each card opens the app
    on the spot, with the view (and search criteria, when relevant) pre-filled.</p>
  <div id="galleryList" class="gallerycards"><p class="muted small">Loading…</p></div>
</main>
<script src="./sharestate.js"></script>
<script src="./gallery.js"></script>
<script>
'use strict';
// tiny standalone page: fetch the editorial file, validate it with the same
// logic the test suite runs, and render one card per entry
const GALLERY_LANG = (navigator.language || 'en').slice(0, 2);
fetch('./gallery.json')
  .then((r) => r.json())
  .then((raw) => {
    const list = document.getElementById('galleryList');
    list.textContent = '';
    for (const e of validateGallery(raw)) {
      const card = document.createElement('a');
      card.className = 'gallerycard';
      card.href = './index.html#' + galleryEntryHash(e);
      const h = document.createElement('h2');
      h.textContent = galleryText(e.title, GALLERY_LANG);
      const p = document.createElement('p');
      p.textContent = galleryText(e.desc, GALLERY_LANG);
      const meta = document.createElement('p');
      meta.className = 'mono gallerymeta';
      meta.textContent = `seed ${e.seed} · ${e.x}, ${e.z}`;
      card.append(h, p, meta);
      list.appendChild(card);
    }
  })
  .catch(() => {
    document.getElementById('galleryList').textContent = 'gallery.json could not be loaded.';
  });
</script>
</body>
</html>

sonar.projectKey=akwawa_Seedcartographer
sonar.organization=akwawa

sonar.projectName=Seedcartographer
sonar.sourceEncoding=UTF-8

# application sources; mcfinder.js is generated Emscripten glue, cubiomes is a
# pinned third-party submodule — neither should be analyzed
sonar.sources=.
sonar.exclusions=mcfinder.js,cubiomes/**,fonts/**,node_modules/**,coverage/**,test/**,e2e/**
sonar.tests=test,e2e
sonar.test.inclusions=test/**/*.test.js,e2e/**/*.spec.js

# unit-test coverage produced by `npm run coverage` (node:test lcov reporter)
sonar.javascript.lcov.reportPaths=coverage/lcov.info
# app.js/worker.js/sw.js/gallerypage.js are DOM/worker glue and mcfinder.c
# runs as WASM: all are exercised by the Playwright e2e suite (job e2e),
# which does not produce lcov; unit coverage applies to the pure shared
# modules (seed, search, export, coords, slime, markers, presets, favorites,
# legend, theme)
sonar.coverage.exclusions=e2e/**,eslint.config.js,playwright.config.js,sw.js,app.js,worker.js,gallerypage.js,mcfinder.c
# translation tables are inherently repetitive across languages
sonar.cpd.exclusions=i18n.js,biomes.js

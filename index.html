<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Seedcartographer — Minecraft biome &amp; structure finder</title>
<meta name="theme-color" content="#0c1016">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" href="./icon.svg" type="image/svg+xml">
<link rel="stylesheet" href="./fonts/fonts.css">
<link rel="stylesheet" href="./styles.css">
</head>
<body>
<header class="topbar">
  <div class="brand"><span class="mark"></span>Seedcartographer</div>
  <div class="world">
    <label class="lbl"><span data-i18n="seed">Seed</span>
      <input id="seed" class="mono" spellcheck="false" autocomplete="off">
    </label>
    <label class="chk"><input type="checkbox" id="large"> <span data-i18n="largeBiomes">Large Biomes</span></label>
    <label class="lbl">Java
      <select id="mcver" class="ver" title="Generation version"></select>
    </label>
    <label class="lbl"><span data-i18n="dimension">Dimension</span>
      <select id="dimSel" class="ver"></select>
    </label>
    <button id="loadBtn" class="btn" data-i18n="loadSeed">Load seed</button>
  </div>
  <button id="pngBtn" class="btn ghost" data-i18n="exportPng">Export PNG</button>
  <button id="shareBtn" class="btn ghost" data-i18n="shareLink">Share link</button>
  <select id="langSel" class="ver" title="Language"></select>
</header>

<main>
  <aside class="panel">
    <section class="card">
      <h2 data-i18n="findPlace">Find a place</h2>
      <p class="lede" data-i18n="lede">Set the conditions, then search the area you're looking at. Results are spots in this seed.</p>

      <div class="field">
        <label for="presetSel" data-i18n="presets">Presets</label>
        <select id="presetSel"></select>
      </div>

      <div class="field">
        <label data-i18n="mainBiomeAny">Main biome (any of)</label>
        <div id="mainBiomes" class="crit"></div>
        <button id="addMainBiome" class="btn tiny" data-i18n="addBiome">+ Add biome</button>
      </div>

      <div class="field">
        <label><span data-i18n="adjacentBiomes">Adjacent biomes</span> <span class="opt" data-i18n="optional">optional</span>
          <select id="adjMode" class="mode"><option value="and" data-i18n="matchAll">match all</option><option value="or" data-i18n="matchAny">match any</option></select>
        </label>
        <div id="adjClauses" class="crit"></div>
        <button id="addAdj" class="btn tiny" data-i18n="addCriterion">+ Add criterion</button>
      </div>

      <div class="field">
        <label><span data-i18n="nearbyStructures">Nearby structures</span> <span class="opt" data-i18n="optional">optional</span>
          <select id="structMode" class="mode"><option value="and" data-i18n="matchAll">match all</option><option value="or" data-i18n="matchAny">match any</option></select>
        </label>
        <div id="structClauses" class="crit"></div>
        <button id="addStruct" class="btn tiny" data-i18n="addCriterion">+ Add criterion</button>
      </div>

      <div class="field two">
        <div><label data-i18n="searchRadius">Search radius</label><input id="range" class="num" type="number" min="500" step="500" value="5000"></div>
        <div><label><span data-i18n="resolution">Resolution</span> <span class="opt" data-i18n="step">step</span></label><input id="step" class="num" type="number" min="16" step="8" value="16"></div>
      </div>

      <button id="searchBtn" class="btn primary" data-i18n="searchBtn">Search this area</button>
      <div id="searchProgress" class="progress" hidden><div id="searchProgressBar" class="bar"></div></div>
      <div id="searchInfo" class="info"></div>
    </section>

    <section class="card">
      <h3 data-i18n="results">Results</h3>
      <div id="exportBtns" class="export" hidden>
        <button id="exportCsv" class="btn tiny" data-i18n="exportCsv">Export CSV</button>
        <button id="exportJson" class="btn tiny" data-i18n="exportJson">Export JSON</button>
      </div>
      <div id="results" class="results"><p class="muted small" data-i18n="noSearchYet">No search yet. Pick conditions and hit search.</p></div>
    </section>

    <section class="card">
      <h3 data-i18n="favorites">Favorites</h3>
      <div id="favList" class="favs"></div>
    </section>

    <section class="card">
      <h3 data-i18n="showOnMap">Show on map</h3>
      <div id="structLayers" class="layers"></div>
    </section>
  </aside>

  <div class="mapwrap">
    <canvas id="map"></canvas>
    <div id="hud" class="hud"><span class="coords mono">0, 0</span><span class="sep">·</span><span class="biome">—</span></div>
    <div id="popup" class="popup"></div>
    <details id="legend" class="legend">
      <summary data-i18n="legend">Legend</summary>
      <div id="legendList" class="legend-list"></div>
    </details>
    <div class="maphelp mono" data-i18n="maphelp">drag to pan · scroll to zoom · click a pin</div>
  </div>
</main>

<script src="./i18n.js"></script>
<script src="./biomes.js"></script>
<script src="./coords.js"></script>
<script src="./slime.js"></script>
<script src="./presets.js"></script>
<script src="./favorites.js"></script>
<script src="./legend.js"></script>
<script src="./export.js"></script>
<script src="./app.js"></script>
</body>
</html>

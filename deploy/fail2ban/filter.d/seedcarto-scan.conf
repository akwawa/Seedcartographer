# Matches nginx access-log lines for requests dropped as 444 (paths outside
# the app's own files — see nginx/default.conf). One malicious/scanning
# client can rack up many of these fast; the jail (../jail.local) bans on
# repeat offense.
[Definition]
failregex = ^<HOST> \S+ \S+ \[.*\] "\S+ \S+ HTTP/\d\.\d" 444
ignoreregex =

# Mutation testing (Stryker) on the pure shared modules. The full run takes
# ~25 minutes (command runner, one `node --test` per mutant), far too slow to
# gate every pull request, so it runs on pushes to main, weekly and on demand.
name: mutation

on:
  push:
    branches: [main]
  schedule:
    - cron: '17 5 * * 1' # every Monday morning
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mutation:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          submodules: true   # the biome-name parity test reads cubiomes/util.c
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run mutation

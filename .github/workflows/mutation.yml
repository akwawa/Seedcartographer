# Mutation testing (Stryker) on the pure shared modules. The full run takes
# ~25 minutes (command runner, one `node --test` per mutant), far too slow to
# gate every pull request, so it runs on pushes to main, weekly and on demand.
name: mutation

on:
  push:
    branches: [main]
  schedule:
    - cron: '17 5 * * 1' # every Monday morning
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mutation:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run mutation

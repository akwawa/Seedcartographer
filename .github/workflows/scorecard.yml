# OpenSSF Scorecard: weekly (and on-push) measurement of the repository's
# supply-chain security posture, published to code scanning and to the
# public Scorecard API (for the README badge).
name: Scorecard

on:
  push:
    branches: [main]
  schedule:
    - cron: '30 4 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      security-events: write   # upload the SARIF results to code scanning
      id-token: write          # publish_results signed attestation
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true
      - uses: github/codeql-action/upload-sarif@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4.37.3
        with:
          sarif_file: results.sarif

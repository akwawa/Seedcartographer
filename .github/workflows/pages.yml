name: Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      # publish only the runtime files (same set as the Docker image)
      - run: |
          mkdir _site
          cp index.html styles.css app.js worker.js seed.js search.js i18n.js \
             biomes.js coords.js slime.js markers.js presets.js favorites.js legend.js \
             theme.js export.js mcfinder.js mcfinder.wasm \
             manifest.webmanifest icon.svg sw.js _site/
          cp -r fonts _site/
      # stamp the service-worker cache version with a content hash of the assets
      - run: node scripts/sw-version.js _site
      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
      - uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4

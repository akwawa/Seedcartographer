name: Docker

on:
  push:
    branches: [main, dev]
    tags: ['v*']
  pull_request:

jobs:
  image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      # keyless cosign signing needs an OIDC token; scoped to this job only
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      # stamp the service-worker cache version with a content hash of the assets
      - run: node scripts/sw-version.js .
      - run: node scripts/app-version.js .
      # arm64 images are cross-built through QEMU emulation
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        if: github.event_name != 'pull_request'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # GHCR/OCI refs must be lowercase; github.repository preserves the
      # repo's actual case, so it can't be reused as-is for the sbom/cosign
      # steps below (docker/metadata-action lowercases it internally, but
      # only for its own tags output)
      - id: repo
        run: echo "lower=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
      - uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        id: meta
        with:
          images: ghcr.io/${{ steps.repo.outputs.lower }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        id: build
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
      # SBOM (SPDX) + keyless cosign signature for the published image only;
      # pull requests never push, so there's no digest to attest/sign
      - uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        if: github.event_name != 'pull_request'
        with:
          image: ghcr.io/${{ steps.repo.outputs.lower }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: false
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        if: github.event_name != 'pull_request'
      - if: github.event_name != 'pull_request'
        env:
          COSIGN_EXPERIMENTAL: '1'
          IMAGE_REF: ghcr.io/${{ steps.repo.outputs.lower }}@${{ steps.build.outputs.digest }}
        run: |
          cosign sign --yes "$IMAGE_REF"
          cosign attest --yes --predicate sbom.spdx.json --type spdxjson "$IMAGE_REF"
      # PR-only vulnerability gate: load a local amd64 image and scan it with
      # Trivy, failing the job on fixable critical CVEs
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        if: github.event_name == 'pull_request'
        with:
          context: .
          load: true
          tags: seedcartographer:scan
      - uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        if: github.event_name == 'pull_request'
        with:
          image-ref: seedcartographer:scan
          format: table
          exit-code: '1'
          severity: CRITICAL
          ignore-unfixed: true
      # the security headers must actually reach a served response, not just
      # exist in the conf file
      - if: github.event_name == 'pull_request'
        run: |
          docker run -d --rm --name seedcarto-hdrtest -p 8080:8080 seedcartographer:scan
          trap 'docker stop seedcarto-hdrtest' EXIT
          for _ in $(seq 1 20); do curl -sf http://localhost:8080/ >/dev/null && break; sleep 0.5; done
          headers=$(curl -sI http://localhost:8080/)
          echo "$headers"
          for h in 'x-content-type-options: nosniff' 'x-frame-options: DENY' 'referrer-policy: strict-origin-when-cross-origin' 'cross-origin-opener-policy: same-origin' 'permissions-policy:' 'content-security-policy:.*frame-ancestors'; do
            echo "$headers" | grep -qi "$h" || { echo "missing header: $h"; exit 1; }
          done
          # a declared file still serves normally, but a path outside the
          # app's own files (scanner probe) gets no response at all (444)
          code=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/gallery.json)
          [ "$code" = 200 ] || { echo "gallery.json should serve, got $code"; exit 1; }
          if curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/wp-login.php 2>/dev/null; then
            echo "expected the connection to be closed for an unknown path"; exit 1
          fi

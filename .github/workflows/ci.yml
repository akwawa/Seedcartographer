name: CI

on:
  push:
    branches: [main]
  pull_request:

# least-privilege token for every job (SonarQube security rule)
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true   # the biome-name parity test reads cubiomes/util.c
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run lint
      - run: npm run lint:css
      - run: npm run typecheck
      - run: npm test
      # every branch of the shared pure modules must be exercised
      - run: npm run coverage:branches
      # scanGrid micro-benchmark: fails on a performance regression beyond
      # the time budget (durations are logged for tracking)
      - run: node scripts/bench-scan.js
        env:
          BENCH_BUDGET_MS: '2000'

  # Dockerfile, workflow and shell-script linting
  static:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: Dockerfile
      - uses: raven-actions/actionlint@3d39aea434753780c3b3d4a1a31c854b4dbf49d7 # v2.2.0
      - run: shellcheck build.sh

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      - run: ./node_modules/.bin/playwright install --with-deps chromium
      # the perf spec fails beyond the first-map-render time budget
      - run: npm run e2e
        env:
          RENDER_BUDGET_MS: '15000'

  # Lighthouse audit of the served page: performance, accessibility,
  # best practices and SEO scores must stay above the lighthouserc floors
  lighthouse:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.0.0
        with:
          node-version: 22
          cache: npm
      # lhci is a pinned devDependency installed with lifecycle scripts
      # disabled: no on-demand npx execution (S6505)
      - run: npm ci --ignore-scripts
      - run: ./node_modules/.bin/lhci autorun

  # SonarQube Cloud analysis (quality gate + unit-test coverage). Requires the
  # SONAR_TOKEN repository secret; the scan step is skipped when it is not
  # available (Dependabot PRs, forks) so those PRs are not blocked.
  sonar:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true   # the biome-name parity test reads cubiomes/util.c
          fetch-depth: 0   # full history improves blame-based analysis
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run coverage
      # the secrets context is not allowed in a step `if`: the token is
      # exposed as job-level env and tested through the env context instead
      - uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8.2.0
        if: env.SONAR_TOKEN != ''

  # the committed mcfinder.wasm/js must be reproducible from mcfinder.c and
  # the pinned cubiomes submodule with the pinned emsdk version
  wasm:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true
      - uses: mymindstorm/setup-emsdk@4528d102f7230f0e7b276855c01ea1159be0e984 # v16
        with:
          version: 6.0.2
      - run: ./build.sh
      - run: git diff --exit-code mcfinder.wasm mcfinder.js

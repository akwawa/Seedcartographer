# Security headers for the served app. Included at http level (nginx's base
# image loads every /etc/nginx/conf.d/*.conf from its http block), so these
# apply to every server/location without touching the base image's own
# default.conf.
add_header X-Content-Type-Options nosniff always;
add_header Referrer-Policy strict-origin-when-cross-origin always;
add_header X-Frame-Options DENY always;
add_header Cross-Origin-Opener-Policy same-origin always;
# No feature needs cross-origin embedding or any of these browser APIs.
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()" always;
# Same policy as the <meta> tag in index.html/gallery.html, plus
# frame-ancestors (meta CSP cannot carry it) so the app can never be framed.
add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://analytics.super-h.fr 'wasm-unsafe-eval'; connect-src 'self' https://analytics.super-h.fr; worker-src 'self'; style-src 'self'; font-src 'self'; img-src 'self'; manifest-src 'self'; base-uri 'none'; form-action 'none'; object-src 'none'; frame-ancestors 'none'" always;

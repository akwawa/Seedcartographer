# Replaces the base image's default.conf (still listens on 8080, matching
# the nginx-unprivileged variant). The app is a handful of static files: any
# request that doesn't resolve to one of them (scanner probes — wp-login.php,
# .env, xmlrpc.php...) is routed to a named location that rate-limits and
# closes the connection instead of answering, so repeated probing from one
# client gets throttled and then dropped without even a response to parse.
limit_req_zone $binary_remote_addr zone=unknown_path:10m rate=5r/m;
limit_req_status 444;

server {
    listen 8080;
    listen [::]:8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/index.html @blocked;
    }

    location @blocked {
        limit_req zone=unknown_path burst=3 nodelay;
        return 444;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
